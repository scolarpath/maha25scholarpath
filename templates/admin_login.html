<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Login - Maha25 ScholarPath</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:20px;
color:#2c3e50;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#04AA6D;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#03945d;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form action="/admin" method="POST">

<input type="text" name="username" placeholder="Admin Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
