<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OTP Verification</title>

<style>

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#f4f7f6;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.site-header{
text-align:center;
margin-bottom:30px;
color:#2c3e50;
}

.form-container{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
width:100%;
max-width:400px;
}

input{
width:100%;
padding:12px;
margin:10px 0 20px;
border:1px solid #ccc;
border-radius:4px;
box-sizing:border-box;
}

button{
background:#04AA6D;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

.nav{
margin-bottom:20px;
}

.nav a{
margin:0 10px;
text-decoration:none;
color:#2c3e50;
font-weight:bold;
}

</style>

</head>

<body>

<div class="site-header">
<h1>Maha 25 ScholarScheme</h1>
<p>Your Gateway to Academic Excellence</p>
</div>

<div class="nav">
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/contact">Contact</a>
<a href="/information">Information</a>
</div>

<div class="form-container">

<h2>Enter OTP</h2>

<form action="/verify_otp" method="POST">

<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>

<label>OTP</label>
<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

</div>

</body>
</html>
